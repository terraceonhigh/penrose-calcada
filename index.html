<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Penrose Tiling Debug</title>
<style>
  body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #ccc; }
  canvas { border: 1px solid #444; }
  .controls { margin: 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; max-width: 700px; justify-content: center; }
  button { padding: 6px 14px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; cursor: pointer; font-size: 12px; }
  button:hover { background: #444; }
  select, label { font-size: 12px; }
  select { padding: 4px; background: #333; color: #ccc; border: 1px solid #555; border-radius: 4px; }
  .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; justify-content: center; width: 100%; }
</style>
</head>
<body>

<canvas id="tilingCanvas" width="600" height="200"></canvas>
<div class="controls">
  <div class="row">
    <button onclick="render()">Regenerate</button>
    <label>Subdivisions: <input type="range" id="subSlider" min="2" max="8" value="6" oninput="document.getElementById('subVal').textContent=this.value;render()"><span id="subVal">6</span></label>
    <label>Scale: <input type="range" id="scaleSlider" min="20" max="200" value="100" oninput="document.getElementById('scaleVal').textContent=this.value+'%';render()"><span id="scaleVal">100%</span></label>
    <label>Opacity: <input type="range" id="opacitySlider" min="0" max="100" value="100" oninput="document.getElementById('opVal').textContent=this.value+'%';document.getElementById('tilingCanvas').style.opacity=this.value/100"><span id="opVal">100%</span></label>
  </div>
  <div class="row">
    <label>Theme:
      <select id="themeSelect" onchange="render()">
        <option value="dark">Default Dark</option>
        <option value="azulejo">Azulejo</option>
        <option value="azulejo-dark">Azulejo Dark</option>
        <option value="calcada">Calcada</option>
        <option value="calcada-dark">Calcada Dark</option>
      </select>
    </label>
    <label>Colouring:
      <select id="colorRule" onchange="render()">
        <option value="triangle-type">Triangle type</option>
        <option value="rhombus-type">Rhombus type (thick/thin)</option>
        <option value="rhombus-solid">Rhombus outlines only</option>
        <option value="rhombus-alt">Rhombus alternating</option>
        <option value="star-detect">Star/sun detection</option>
      </select>
    </label>
    <label>Borders:
      <select id="borderRule" onchange="render()">
        <option value="all">All edges</option>
        <option value="rhombus">Rhombus edges only</option>
        <option value="none">None</option>
      </select>
    </label>
  </div>
</div>
<div id="info" style="font-size:11px;color:#888;"></div>

<script>
const PHI = (1 + Math.sqrt(5)) / 2;

const THEMES = {
  'dark':         { bg: '#111', bg2: '#1a1a1a', bg3: '#222', fg: '#e0e0e0', fg2: '#aaa', fg3: '#666', accent: '#5b9bd5', border: '#333' },
  'azulejo':      { bg: '#f0f4f8', bg2: '#e4eaf0', bg3: '#d0d8e2', fg: '#1a2a3a', fg2: '#4a5a6a', fg3: '#7a8a9a', accent: '#2a6496', border: '#b8c4d0' },
  'azulejo-dark': { bg: '#0e1520', bg2: '#162030', bg3: '#1e2a3a', fg: '#d0dce8', fg2: '#8a9ab0', fg3: '#4a5a70', accent: '#4a8ec8', border: '#2a3a50' },
  'calcada':      { bg: '#ece6dc', bg2: '#e2dbd0', bg3: '#d6cfc3', fg: '#2b2b2b', fg2: '#4a4a48', fg3: '#7a7a76', accent: '#4a4a48', border: '#c0b9ad' },
  'calcada-dark': { bg: '#1a1a1a', bg2: '#222222', bg3: '#2c2c2a', fg: '#ddd8d0', fg2: '#a8a49c', fg3: '#6a6864', accent: '#c8c0b4', border: '#3a3a38' },
};

function subdivide(triangles) {
  const result = [];
  for (const tri of triangles) {
    const [type, ax, ay, bx, by, cx, cy] = tri;
    if (type === 0) {
      const px = ax + (bx - ax) / PHI;
      const py = ay + (by - ay) / PHI;
      result.push([0, cx, cy, px, py, bx, by]);
      result.push([1, px, py, cx, cy, ax, ay]);
    } else {
      const qx = bx + (ax - bx) / PHI;
      const qy = by + (ay - by) / PHI;
      const rx = bx + (cx - bx) / PHI;
      const ry = by + (cy - by) / PHI;
      result.push([1, rx, ry, cx, cy, ax, ay]);
      result.push([1, qx, qy, rx, ry, bx, by]);
      result.push([0, rx, ry, qx, qy, ax, ay]);
    }
  }
  return result;
}

// Pair triangles into rhombi by finding shared hypotenuse
function pairIntoRhombi(triangles) {
  const edgeMap = new Map();
  const paired = new Set();
  const rhombi = [];

  // Key: sorted endpoints of the longest edge (hypotenuse = BC for our triangles)
  function edgeKey(x1, y1, x2, y2) {
    const k1 = x1.toFixed(4) + ',' + y1.toFixed(4);
    const k2 = x2.toFixed(4) + ',' + y2.toFixed(4);
    return k1 < k2 ? k1 + '|' + k2 : k2 + '|' + k1;
  }

  for (let i = 0; i < triangles.length; i++) {
    const [type, ax, ay, bx, by, cx, cy] = triangles[i];
    // The shared edge is BC (the base of the isosceles triangle)
    const key = edgeKey(bx, by, cx, cy);
    if (edgeMap.has(key)) {
      const j = edgeMap.get(key);
      const [type2, ax2, ay2] = triangles[j];
      // Rhombus: A1, B, A2, C (the two apices and the shared base vertices)
      rhombi.push({
        type: type, // both should be same type
        verts: [[ax, ay], [bx, by], [ax2, ay2], [cx, cy]],
        idx: rhombi.length
      });
      paired.add(i);
      paired.add(j);
    } else {
      edgeMap.set(key, i);
    }
  }

  // Unpaired triangles (at edges) - render as-is
  for (let i = 0; i < triangles.length; i++) {
    if (!paired.has(i)) {
      const [type, ax, ay, bx, by, cx, cy] = triangles[i];
      rhombi.push({
        type: type,
        verts: [[ax, ay], [bx, by], [cx, cy]],
        idx: rhombi.length,
        unpaired: true
      });
    }
  }
  return rhombi;
}

// Detect star vertices (5 thick rhombi meeting at a point)
function detectStars(rhombi) {
  const vertexMap = new Map();
  for (let i = 0; i < rhombi.length; i++) {
    if (rhombi[i].unpaired) continue;
    for (const [vx, vy] of rhombi[i].verts) {
      const key = vx.toFixed(3) + ',' + vy.toFixed(3);
      if (!vertexMap.has(key)) vertexMap.set(key, []);
      vertexMap.get(key).push(i);
    }
  }
  const starRhombi = new Set();
  for (const [, indices] of vertexMap) {
    const thickCount = indices.filter(i => rhombi[i].type === 0).length;
    if (thickCount >= 5) {
      for (const i of indices) {
        if (rhombi[i].type === 0) starRhombi.add(i);
      }
    }
  }
  return starRhombi;
}

let currentRotation = Math.random() * Math.PI * 2;

function render() {
  const canvas = document.getElementById('tilingCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const subdivisions = parseInt(document.getElementById('subSlider').value);
  const scalePct = parseInt(document.getElementById('scaleSlider').value) / 100;
  const colorRule = document.getElementById('colorRule').value;
  const borderRule = document.getElementById('borderRule').value;
  const theme = THEMES[document.getElementById('themeSelect').value];

  // Generate triangles
  const rot = currentRotation;
  const R = Math.max(W, H) * 0.75 / scalePct;
  let triangles = [];
  for (let i = 0; i < 10; i++) {
    const a1 = rot + (2 * i - 1) * Math.PI / 10;
    const a2 = rot + (2 * i + 1) * Math.PI / 10;
    const bx = R * Math.cos(a1), by = R * Math.sin(a1);
    const cx = R * Math.cos(a2), cy = R * Math.sin(a2);
    if (i % 2 === 0) {
      triangles.push([0, 0, 0, cx, cy, bx, by]);
    } else {
      triangles.push([0, 0, 0, bx, by, cx, cy]);
    }
  }

  for (let s = 0; s < subdivisions; s++) {
    triangles = subdivide(triangles);
  }

  // Background
  ctx.fillStyle = theme.bg2;
  ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scalePct, scalePct);

  if (colorRule === 'triangle-type') {
    // Original: colour by triangle type
    for (const [type, ax, ay, bx, by, cx, cy] of triangles) {
      ctx.fillStyle = type === 0 ? theme.accent : theme.bg3;
      if (borderRule !== 'none') {
        ctx.strokeStyle = theme.border;
        ctx.lineWidth = 0.5 / scalePct;
      }
      ctx.beginPath();
      ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx, cy);
      ctx.closePath();
      ctx.fill();
      if (borderRule !== 'none') ctx.stroke();
    }
  } else {
    // Pair into rhombi for all other modes
    const rhombi = pairIntoRhombi(triangles);
    const starSet = colorRule === 'star-detect' ? detectStars(rhombi) : new Set();

    for (const r of rhombi) {
      // Determine fill colour
      switch (colorRule) {
        case 'rhombus-type':
          ctx.fillStyle = r.type === 0 ? theme.accent : theme.bg3;
          break;
        case 'rhombus-solid':
          ctx.fillStyle = theme.bg2;
          break;
        case 'rhombus-alt':
          ctx.fillStyle = r.idx % 2 === 0 ? theme.accent : theme.bg3;
          break;
        case 'star-detect':
          if (starSet.has(r.idx)) {
            ctx.fillStyle = theme.accent;
          } else {
            ctx.fillStyle = r.type === 0 ? theme.fg3 : theme.bg3;
          }
          break;
      }

      // Draw
      if (borderRule !== 'none') {
        ctx.strokeStyle = colorRule === 'rhombus-solid' ? theme.accent : theme.border;
        ctx.lineWidth = (colorRule === 'rhombus-solid' ? 1.0 : 0.5) / scalePct;
      }
      ctx.beginPath();
      ctx.moveTo(r.verts[0][0], r.verts[0][1]);
      for (let k = 1; k < r.verts.length; k++) ctx.lineTo(r.verts[k][0], r.verts[k][1]);
      ctx.closePath();
      ctx.fill();
      if (borderRule !== 'none' && !(borderRule === 'rhombus' && r.unpaired)) ctx.stroke();
    }
  }

  ctx.restore();

  document.getElementById('info').textContent =
    `${triangles.length} triangles, ${subdivisions} subdivisions, scale ${Math.round(scalePct*100)}%`;
}

render();
</script>
</body>
</html>
